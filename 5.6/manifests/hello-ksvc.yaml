# Minimal Knative Service (getting-started "hello" example).
# A ksvc is the serverless unit: Knative manages Route + Configuration +
# Revision + autoscaling (incl. scale-to-zero) from this one object.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: hello
  namespace: default
spec:
  template:
    spec:
      containers:
        - image: ghcr.io/knative/helloworld-go:latest
          ports:
            - containerPort: 8080
          env:
            - name: TARGET
              value: "Knative on k3d (5.6)"
