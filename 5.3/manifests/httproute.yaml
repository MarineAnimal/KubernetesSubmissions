# Istio ambient east-west traffic split. The HTTPRoute is attached to the
# greeter-svc Service (parentRef kind: Service). Requests to greeter-svc are
# captured by the namespace waypoint and split 75% v1 / 25% v2.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: greeter-route
  namespace: default
spec:
  parentRefs:
    - group: ""
      kind: Service
      name: greeter-svc
  rules:
    - backendRefs:
        - name: greeter-svc-1
          port: 80
          weight: 75
        - name: greeter-svc-2
          port: 80
          weight: 25
