name: Production GitOps

on:
  push:
    tags:
      - '**'

jobs:
  build-todo-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./the_project
          file: ./the_project/Dockerfile
          push: true
          tags: anyasnif/todo-app:${{ github.sha }}

  build-broadcaster:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./the_project/broadcaster
          file: ./the_project/broadcaster/Dockerfile
          push: true
          tags: anyasnif/broadcaster:${{ github.sha }}

  build-log-output:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and publish log-output
        working-directory: the_project/log-output
        run: |-
          docker build --tag "anyasnif/log-output:$GITHUB_SHA" .
          docker push "anyasnif/log-output:$GITHUB_SHA"

  update-production-manifest:
    needs: [build-todo-app, build-broadcaster, build-log-output]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - uses: imranismail/setup-kustomize@v3

      - name: Update all three image tags
        working-directory: the_project/overlays/production
        run: |
          kustomize edit set image PROJECT/IMAGE=anyasnif/todo-app:${{ github.sha }}
          kustomize edit set image PROJECT/BROADCASTER=anyasnif/broadcaster:${{ github.sha }}
          kustomize edit set image PROJECT/LOGOUTPUT=anyasnif/log-output:${{ github.sha }}

      - name: Commit and push updated manifest
        uses: EndBug/add-and-commit@v9
        with:
          add: 'the_project/overlays/production/kustomization.yaml'
          message: 'Deploy ${{ github.sha }} to production (tag ${{ github.ref_name }})'
          default_author: github_actor
          pull: '--rebase --autostash'
