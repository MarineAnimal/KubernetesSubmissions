name: Project (todo-app) GitOps

on:
  push:
    branches: [main]
    paths:
      - 'the_project/index.js'
      - 'the_project/package.json'
      - 'the_project/package-lock.json'
      - 'the_project/Dockerfile'
      - 'the_project/k8s/deployment.yaml'
      - '.github/workflows/project.yaml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./the_project
          file: ./the_project/Dockerfile
          push: true
          tags: anyasnif/todo-app:${{ github.sha }}

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update image tag in kustomization.yaml
        working-directory: the_project
        run: kustomize edit set image PROJECT/IMAGE=anyasnif/todo-app:${{ github.sha }}

      - name: Commit and push updated manifest
        uses: EndBug/add-and-commit@v9
        with:
          add: 'the_project/kustomization.yaml'
          message: 'Update todo-app image to ${{ github.sha }}'
          default_author: github_actor
