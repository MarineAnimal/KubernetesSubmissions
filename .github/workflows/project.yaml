name: Project (todo-app) GitOps

on:
  push:
    branches: [main]
    tags: ['**']

jobs:
  changes:
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'the_project/index.js'
              - 'the_project/package.json'
              - 'the_project/package-lock.json'
              - 'the_project/Dockerfile'
              - 'the_project/k8s/deployment.yaml'
              - '.github/workflows/project.yaml'

  deploy-staging:
    needs: changes
    if: github.ref_type == 'branch' && needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: staging-manifest-commit
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./the_project
          file: ./the_project/Dockerfile
          push: true
          tags: anyasnif/todo-app:${{ github.sha }}

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v3

      - name: Pull latest before editing
        run: git pull origin main --rebase --autostash

      - name: Update staging image tag
        working-directory: the_project/overlays/staging
        run: kustomize edit set image PROJECT/IMAGE=anyasnif/todo-app:${{ github.sha }}

      - name: Commit and push updated manifest
        uses: EndBug/add-and-commit@v9
        with:
          add: 'the_project/overlays/staging/kustomization.yaml'
          message: 'Deploy todo-app ${{ github.sha }} to staging'
          default_author: github_actor
          pull: '--rebase --autostash'

  deploy-production:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    concurrency:
      group: production-manifest-commit
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./the_project
          file: ./the_project/Dockerfile
          push: true
          tags: anyasnif/todo-app:${{ github.sha }}

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v3

      - name: Switch to main for manifest update
        run: |
          git fetch origin main
          git checkout -B main origin/main
          git pull origin main --rebase --autostash

      - name: Update production image tag
        working-directory: the_project/overlays/production
        run: kustomize edit set image PROJECT/IMAGE=anyasnif/todo-app:${{ github.sha }}

      - name: Commit and push updated manifest
        uses: EndBug/add-and-commit@v9
        with:
          add: 'the_project/overlays/production/kustomization.yaml'
          message: 'Deploy todo-app ${{ github.sha }} to production (tag ${{ github.ref_name }})'
          default_author: github_actor
          pull: '--rebase --autostash'
