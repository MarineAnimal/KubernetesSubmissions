apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-app
  template:
    metadata:
      labels:
        app: todo-app
    spec:
      containers:
        - name: todo-app
          image: todo-app:1.6
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: DEMO_GREETING
              value: "My todo app is running. cool!"
            - name: DEMO_FAREWELL
              value: "In case anyone sees this, the weather today is terrible."