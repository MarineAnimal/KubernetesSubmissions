apiVersion: v1
kind: Service
metadata:
  name: todo-app-svc
spec:
  type: NodePort
  selector:
    app: todo-app # matches the Deployment's pod label
  ports:
    - name: http
      nodePort: 30080 # external port (must be 30000-32767)
      protocol: TCP
      port: 1234 # in-cluster port
      targetPort: 3000 # container port
