# NOTE: These are throwaway credentials that exist only for this course exercise —
# they belong to a local ping-pong Postgres that stores nothing real and is never
# exposed outside the cluster. Committing a Secret to git is the anti-pattern the
# course itself warns about; it's done here deliberately, with full awareness, for
# exercise simplicity. The password has no value or reach beyond this exercise.
apiVersion: v1
kind: Secret
metadata:
  name: pingpong-db-secret
  namespace: exercises
  labels:
    app: pingpong-postgres
stringData:
  POSTGRES_USER: pingpong_user
  POSTGRES_PASSWORD: pingpong_password
  POSTGRES_DB: pingpong
