apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: staging

resources:
  - ../../base

patches:
  - path: broadcaster-patch.yaml

images:
  - name: PROJECT/IMAGE
    newName: anyasnif/todo-app
    newTag: latest
  - name: PROJECT/BROADCASTER
    newName: anyasnif/broadcaster
    newTag: latest
  - name: PROJECT/LOGOUTPUT
    newName: anyasnif/log-output
    newTag: latest
