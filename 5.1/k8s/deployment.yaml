apiVersion: apps/v1
kind: Deployment
metadata:
  name: dummysite-operator
  namespace: default
  labels:
    app.kubernetes.io/name: dummysite-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dummysite-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dummysite-operator
    spec:
      serviceAccountName: dummysite-operator
      containers:
        - name: operator
          image: dummysite-operator:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: RECONCILE_INTERVAL_MS
              value: "30000"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
