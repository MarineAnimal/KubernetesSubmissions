apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: dummysites.dummysite.example.com
spec:
  group: dummysite.example.com
  scope: Namespaced
  names:
    kind: DummySite
    listKind: DummySiteList
    plural: dummysites
    singular: dummysite
    shortNames:
      - ds
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - website_url
              properties:
                website_url:
                  type: string
                  description: The URL of the website to copy and serve.
      additionalPrinterColumns:
        - name: Website
          type: string
          jsonPath: .spec.website_url
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
