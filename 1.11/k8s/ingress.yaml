apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shared-ingress
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /log(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: log-output-svc
            port:
              number: 80

      - path: /pingpong(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: pingpong-svc
            port:
              number: 80