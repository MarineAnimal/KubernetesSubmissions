apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shared-ingress
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      # Ping-pong app: requests to /pingpong go here (it listens on /pingpong).
      - path: /pingpong
        pathType: Prefix
        backend:
          service:
            name: pingpong-svc
            port:
              number: 80
      # Log output app shares this same Ingress: everything else goes here.
      - path: /
        pathType: Prefix
        backend:
          service:
            name: log-output-svc
            port:
              number: 80
